<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake</title>
    <script>
        if (window.location.pathname.indexOf('.') === -1 && !window.location.pathname.endsWith('/')) {
            const base = document.createElement('base');
            base.href = window.location.pathname + '/';
            document.head.appendChild(base);
        }
    </script>
    <!-- Prevent caching to ensure new JS loads -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        
        #game-container {
            position: relative;
        }

        canvas {
            background: #000;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            border: 2px solid #333;
            border-radius: 8px;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }
        
        .score-box {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .score-p1 {
            color: #7bed9f;
            text-shadow: 0 0 10px rgba(123, 237, 159, 0.5);
        }

        .score-p2 {
            color: #70a1ff;
            text-shadow: 0 0 10px rgba(112, 161, 255, 0.5);
            text-align: right;
            display: none; /* hidden in 1p mode */
        }

        .score {
            font-size: 24px;
            font-weight: 800;
        }

        .controls {
            font-size: 12px;
            opacity: 0.8;
            font-weight: bold;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.85);
            border-radius: 8px;
            z-index: 20;
        }

        .title {
            color: #4cd137;
            font-size: 48px;
            text-shadow: 0 0 20px rgba(76, 209, 55, 0.6);
            margin-bottom: 40px;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .menu {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .controls-info {
            text-align: center;
            color: #eccc68;
            font-size: 14px;
            line-height: 1.6;
            background: rgba(0,0,0,0.5);
            padding: 15px 25px;
            border-radius: 8px;
            border: 1px solid #333;
        }
        
        .controls-info p {
            margin: 5px 0;
        }

        #game-over h2 {
            font-size: 36px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        button {
            padding: 12px 24px;
            font-size: 18px;
            font-weight: 800;
            background: #fbc531;
            color: #000;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        button:hover {
            transform: translateY(-2px);
            background: #fff;
            box-shadow: 0 5px 15px rgba(251, 197, 49, 0.4);
        }
        
        button:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="ui" style="display: none;">
            <div class="score-box score-p1" id="ui-p1">
                <div class="score">SCORE <span id="score-p1-val">0</span></div>
            </div>
            <div class="score-box score-p2" id="ui-p2">
                <div class="score">P2 SCORE <span id="score-p2-val">0</span></div>
            </div>
        </div>

        <div id="start-screen" class="overlay">
            <h1 class="title">Neon Snake</h1>
            <div id="start-leaderboard" style="margin-bottom: 20px; width: 300px;"></div>
            <div class="menu">
                <button onclick="window.startGameMode(1)">1 Player</button>
                <button onclick="window.startGameMode(2)">2 Players</button>
            </div>
            <div class="controls-info">
                <p><strong>1 Player:</strong> Use Arrows or WASD</p>
                <p><strong>2 Players:</strong> P1 uses WASD | P2 uses Arrows</p>
                <p style="margin-top: 10px; color: #fff;">
                    Eat <span style="color:#ff4757; font-weight:bold;">Red</span> for points, 
                    <span style="color:#fbc531; font-weight:bold;">Gold</span> for mega-growth, 
                    <span style="color:#9c88ff; font-weight:bold;">Purple</span> to shrink!
                </p>
                <p style="margin-top: 15px; font-size: 12px; color: #aaa;">You can press SPACE to Pause</p>
            </div>
        </div>

        <div id="game-over" class="overlay" style="display:none;">
            <h2 id="winner-text">GAME OVER</h2>
            <div id="game-over-leaderboard" style="margin-bottom: 20px; width: 300px; display: none;"></div>
            
            <div id="hs-input-section" style="display:none; flex-direction: column; align-items: center; margin-bottom: 20px;">
                <h3 style="color:#fbc531; margin-bottom: 10px; text-shadow: 0 0 10px rgba(251, 197, 49, 0.5);">NEW HIGH SCORE!</h3>
                <p style="margin-bottom: 15px; font-weight: bold;">PLEASE ENTER YOUR INITIALS:</p>
                <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <input type="text" id="hs-initials" maxlength="3" autocomplete="off" style="font-size: 24px; text-align: center; width: 80px; text-transform: uppercase; background: #000; color: #fbc531; border: 2px solid #fbc531; border-radius: 4px; padding: 5px; outline: none;">
                    <button id="hs-submit-btn">SUBMIT</button>
                </div>
            </div>

            <button id="main-menu-btn" onclick="window.showMenu()">MAIN MENU</button>
        </div>
    </div>

    <!-- Added cache busting parameter to force fresh JS -->
    <script>
        const script = document.createElement('script');
        script.type = 'module';
        script.src = 'game.js?v=' + new Date().getTime();
        document.body.appendChild(script);
    </script>
</body>
</html>
