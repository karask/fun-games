<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Pong</title>
    <script>
        if (window.location.pathname.indexOf('.') === -1 && !window.location.pathname.endsWith('/')) {
            const base = document.createElement('base');
            base.href = window.location.pathname + '/';
            document.head.appendChild(base);
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        #game-container {
            position: relative;
        }

        canvas {
            background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%);
            border: 2px solid #00d2d3;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 210, 211, 0.3);
        }

        #ui {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 150px;
            pointer-events: none;
        }

        .score {
            font-size: 48px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 0 0 15px rgba(0, 210, 211, 0.5);
            font-family: monospace;
        }

        .controls-hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #555;
            font-size: 14px;
            letter-spacing: 2px;
            pointer-events: none;
        }
        
        /* Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.85);
            border-radius: 12px;
            z-index: 20;
        }

        .title {
            color: #00d2d3;
            font-size: 48px;
            text-shadow: 0 0 20px rgba(0, 210, 211, 0.6);
            margin-bottom: 20px;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button {
            padding: 12px 24px;
            font-size: 18px;
            font-weight: 800;
            background: #00d2d3;
            color: #000;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        button:hover {
            transform: translateY(-2px);
            background: #fff;
            box-shadow: 0 5px 15px rgba(0, 210, 211, 0.4);
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div id="ui">
            <div class="score" id="score-p1">0</div>
            <div class="score" id="score-p2">0</div>
        </div>
        <div class="controls-hint">FIRST TO 5 WINS • W/S FOR P1 • UP/DOWN FOR P2</div>
        
        <div id="start-screen" class="overlay">
            <h1 class="title">Cyber Pong</h1>
            <h3 style="color:#fff; margin-bottom: 20px;">LONGEST RALLIES</h3>
            <div id="start-leaderboard" style="margin-bottom: 20px; width: 300px;"></div>
            <button onclick="window.startGame()">START MATCH</button>
        </div>

        <div id="game-over" class="overlay" style="display:none;">
            <h2 id="winner-text" style="color: #ff9ff3; font-size: 36px; margin-bottom: 10px;">GAME OVER</h2>
            <p id="rally-text" style="color: #fff; margin-bottom: 20px;"></p>
            
            <div id="game-over-leaderboard" style="margin-bottom: 20px; width: 300px; display: none;"></div>
            
            <div id="hs-input-section" style="display:none; flex-direction: column; align-items: center; margin-bottom: 20px;">
                <h3 style="color:#00d2d3; margin-bottom: 10px; text-shadow: 0 0 10px rgba(0, 210, 211, 0.5);">NEW LONGEST RALLY!</h3>
                <p style="margin-bottom: 15px; font-weight: bold;">PLEASE ENTER YOUR INITIALS:</p>
                <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <input type="text" id="hs-initials" maxlength="3" autocomplete="off" style="font-size: 24px; text-align: center; width: 80px; text-transform: uppercase; background: #000; color: #00d2d3; border: 2px solid #00d2d3; border-radius: 4px; padding: 5px; outline: none;">
                    <button id="hs-submit-btn">SUBMIT</button>
                </div>
            </div>

            <button id="main-menu-btn" onclick="window.showMenu()">MAIN MENU</button>
        </div>
    </div>

    <script type="module">
        const script = document.createElement('script');
        script.type = 'module';
        script.src = 'game.js?v=' + new Date().getTime();
        document.body.appendChild(script);
    </script>
</body>
</html>
