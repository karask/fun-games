<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Survival</title>
    <script>
        if (window.location.pathname.indexOf('.') === -1 && !window.location.pathname.endsWith('/')) {
            const base = document.createElement('base');
            base.href = window.location.pathname + '/';
            document.head.appendChild(base);
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        
        #game-container {
            position: relative;
        }

        canvas {
            background: #000;
            box-shadow: 0 0 20px rgba(0, 210, 211, 0.2);
            border: 2px solid #333;
            border-radius: 8px;
            cursor: crosshair;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }
        
        .stat {
            font-size: 24px;
            font-weight: 800;
            color: #00d2d3;
            text-shadow: 0 0 10px rgba(0, 210, 211, 0.5);
        }

        .health {
            color: #ff9ff3;
            text-shadow: 0 0 10px rgba(255, 159, 243, 0.5);
        }

        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.8);
            display: none;
            border-radius: 8px;
        }

        #game-over h2 {
            color: #ff4757;
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 71, 87, 0.5);
        }
        
        #final-score {
            font-size: 20px;
            margin-bottom: 20px;
            color: #00d2d3;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            background: #00d2d3;
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: #fff;
            box-shadow: 0 0 15px #00d2d3;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600" tabindex="0"></canvas>
        <div id="ui">
            <div class="stat">SCORE <span id="score-val">0</span> <span style="font-size: 14px; color:#ccc; margin-left: 10px;">(LVL <span id="level-val">1</span>)</span></div>
            <div class="stat health">HP <span id="health-val">100</span></div>
        </div>
        
        <div id="start-screen" style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.85); z-index: 10;">
            <h1 style="color: #00d2d3; font-size: 48px; margin-bottom: 10px; text-shadow: 0 0 20px rgba(0,210,211,0.6); margin-top: 0;">NEON SURVIVAL</h1>
            <div id="start-leaderboard" style="margin-bottom: 20px; width: 300px;"></div>
            <p style="color: #ccc; margin-bottom: 20px; font-size: 14px;">WASD / Arrows to Move | Space to shoot (Auto-targets!)</p>
            <button onclick="window.startGame()">START GAME</button>
        </div>
        
        <div id="game-over">
            <h2>GAME OVER</h2>
            <div id="final-score">Score: 0</div>
            
            <div id="game-over-leaderboard" style="margin-bottom: 20px; width: 300px; display: none;"></div>
            
            <div id="hs-input-section" style="display:none; flex-direction: column; align-items: center; margin-bottom: 20px;">
                <h3 style="color:#00d2d3; margin-bottom: 10px; text-shadow: 0 0 10px rgba(0, 210, 211, 0.5);">NEW HIGH SCORE!</h3>
                <p style="margin-bottom: 15px; font-weight: bold;">PLEASE ENTER YOUR INITIALS:</p>
                <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <input type="text" id="hs-initials" maxlength="3" autocomplete="off" style="font-size: 24px; text-align: center; width: 80px; text-transform: uppercase; background: #000; color: #00d2d3; border: 2px solid #00d2d3; border-radius: 4px; padding: 5px; outline: none;">
                    <button id="hs-submit-btn">SUBMIT</button>
                </div>
            </div>

            <button id="main-menu-btn" onclick="window.showMenu()">MAIN MENU</button>
        </div>
    </div>

    <script type="module">
        const script = document.createElement('script');
        script.type = 'module';
        script.src = 'game.js?v=' + new Date().getTime();
        document.body.appendChild(script);
    </script>
</body>
</html>
